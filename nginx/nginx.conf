events {}

http {
    # Docker's internal DNS — resolves container names at request time, not startup
    resolver 127.0.0.11 valid=10s;

    # Rate limiting: 5 requests/min per IP on login pages
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

    # HTTP: redirect to HTTPS
    server {
        listen 80;
        server_name groceries.ae563.ru;

        return 301 https://$host$request_uri;
    }

    # HTTPS: groceries
    server {
        listen 443 ssl;
        server_name groceries.ae563.ru;

        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location /login/ {
            limit_req zone=login burst=3 nodelay;

            proxy_pass http://groceries_web:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://groceries_web:8000;

            # WebSocket support (Django Channels)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # trading — HTTP only until ai_gw2_tp is deployed
    server {
        listen 80;
        server_name trading.ae563.ru;

        location / {
            set $trading_upstream http://trading_web:8000;
            proxy_pass $trading_upstream;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
